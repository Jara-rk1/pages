name: PEPI News Dashboard

on:
  schedule:
    # Run daily at 20:00 UTC (6:00 AM AEST next day)
    - cron: '0 20 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch news and generate dashboard
        run: python news_dashboard/fetch_news.py
        env:
          OUTPUT_PATH: news-dashboard/index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news-dashboard/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update PEPI news dashboard $(date -u +%Y-%m-%d)"
            git push
          fi
