<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Sites</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a; color: #e0e0e0;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding: 4rem 1.5rem;
        }
        h1 { font-size: 2.2rem; margin-bottom: 0.4rem; color: #fff; letter-spacing: -0.02em; }
        .subtitle { color: #888; margin-bottom: 3rem; font-size: 1rem; }
        .sites { display: grid; gap: 1.25rem; width: 100%; max-width: 560px; }
        .site-card {
            background: #161616; border: 1px solid #2a2a2a; border-radius: 12px;
            padding: 1.75rem; text-decoration: none; color: inherit;
            transition: border-color 0.2s, transform 0.15s;
        }
        .site-card:hover {
            border-color: #444; transform: translateY(-2px);
        }
        .site-card h2 { font-size: 1.15rem; margin-bottom: 0.5rem; color: #fff; }
        .site-card p { color: #888; font-size: 0.875rem; line-height: 1.5; }
        .footer { margin-top: 3rem; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>
    <h1>Portfolio Sites</h1>
    <p class="subtitle">Static sites hosted via GitHub Pages</p>
    <div class="sites">
        <a class="site-card" href="design-thinking/">
            <h2>Bite Club — Design Thinking</h2>
            <p>Melbourne food community site built for Design Thinking coursework</p>
        </a>
        <a class="site-card" href="horizon-dashboard/">
            <h2>HORIZON — BD Opportunity Engine</h2>
            <p>Government procurement opportunity pipeline dashboard with interactive map</p>
        </a>
    </div>
    <p class="footer">Auto-deployed from source</p>
</body>
</html>
