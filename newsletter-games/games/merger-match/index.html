<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merger Match | KPMG Minigames</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #F5F5F5;
            font-family: Arial, Helvetica, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100dvh; overflow: hidden;
        }
        .game-header {
            width: 100%; background: #00338D; color: white;
            padding: 8px 16px; display: flex; align-items: center; gap: 12px;
            font-size: 14px;
        }
        .game-header a { color: white; text-decoration: none; font-size: 20px; }
        .game-header h1 { font-size: 16px; font-weight: bold; }
        #game-container {
            position: relative; width: 100%; max-width: 480px;
            flex: 1; min-height: 0; display: flex; flex-direction: column; align-items: center;
            padding: 0;
        }
        .game-hud {
            width: 100%; max-width: 480px;
            background: rgba(0, 51, 141, 0.85);
            color: white; padding: 8px 16px;
            display: flex; justify-content: space-between; align-items: center;
            font: bold 14px Arial, Helvetica, sans-serif;
        }
        .game-hud .hud-score { font-size: 16px; }
        .game-hud .hud-info { font-size: 12px; opacity: 0.85; }
        .level-banner {
            display: none; width: 100%; max-width: 480px;
            background: #1E49E2; color: white; text-align: center;
            padding: 10px; font: bold 16px Arial, Helvetica, sans-serif;
        }
        .level-banner.active { display: block; }
        .card-grid {
            display: grid; gap: 8px; padding: 16px;
            justify-content: center; align-content: center;
            flex: 1; width: 100%; max-width: 480px;
        }
        .card-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
        .card-grid.cols-5 { grid-template-columns: repeat(5, 1fr); }
        .card-grid.cols-6 { grid-template-columns: repeat(6, 1fr); }
        .card-cell {
            aspect-ratio: 3/4;
            perspective: 600px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.5s ease;
            transform-style: preserve-3d;
        }
        .card-cell.flipped .card-inner,
        .card-cell.matched .card-inner {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute; inset: 0;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 8px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }
        .card-back {
            background: #00338D;
            color: white;
            font-size: 28px;
            font-weight: bold;
            border: 2px solid #1E49E2;
        }
        .card-front {
            transform: rotateY(180deg);
            background: white;
            border: 2px solid #E5E5E5;
            padding: 6px;
            gap: 4px;
        }
        .card-front .card-icon {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; color: white;
        }
        .card-front .card-label {
            font-size: 9px; font-weight: bold;
            color: #333333; text-align: center;
            line-height: 1.2;
        }
        .card-cell.matched .card-face.card-front {
            border-color: #269924;
            background: #f0fff0;
        }
        .card-cell.matched .card-inner {
            animation: matchPulse 0.4s ease;
        }
        @keyframes matchPulse {
            0% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.08); }
            100% { transform: rotateY(180deg) scale(1); }
        }
        .card-cell.wrong .card-face.card-front {
            border-color: #ED2124;
        }
        .game-over-overlay {
            display: none; position: absolute; inset: 0;
            background: rgba(0, 51, 141, 0.92); color: white;
            flex-direction: column; align-items: center; justify-content: center;
            gap: 16px; z-index: 10; padding: 24px; text-align: center;
            overflow-y: auto;
        }
        .game-over-overlay.active { display: flex; }
        .game-over-overlay .score-display { font-size: 48px; font-weight: bold; }
        .game-over-overlay .label { font-size: 14px; opacity: 0.8; }
        .game-over-overlay .stat { font-size: 20px; font-weight: bold; }
        .game-over-overlay button {
            padding: 12px 32px; border: none; border-radius: 4px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            font-family: Arial, Helvetica, sans-serif;
        }
        .btn-play-again { background: #00B8F5; color: white; }
        .btn-hub { background: white; color: #00338D; }
    </style>
</head>
<body>
    <div class="game-header">
        <a href="../../" title="Back to hub">&larr;</a>
        <h1>Merger Match</h1>
    </div>
    <div id="game-container">
        <div class="game-hud" id="game-hud">
            <span class="hud-score" id="hud-score">Score: 0</span>
            <span class="hud-info" id="hud-matches">Matches: 0/8</span>
            <span class="hud-info" id="hud-flips">Flips: 0</span>
            <span class="hud-info" id="hud-timer">0:00</span>
        </div>
        <div class="level-banner" id="level-banner">Level 1 — 4&times;4</div>
        <div class="card-grid cols-4" id="card-grid"></div>
        <div class="game-over-overlay" id="game-over">
            <div class="label">SCORE</div>
            <div class="score-display" id="final-score">0</div>
            <div class="label">BEST SCORE</div>
            <div class="stat" id="best-score">0</div>
            <div class="label">LEADERBOARD RANK</div>
            <div class="stat" id="rank">-</div>
            <div class="label" id="attempts-left">2 attempts remaining</div>
            <button class="btn-play-again" id="btn-again">Play Again</button>
            <button class="btn-hub" onclick="window.location.href='../../'">Back to Hub</button>
        </div>
    </div>
    <script src="../../assets/game-engine.js"></script>
    <script src="game.js"></script>
</body>
</html>
